name: build-linux-aarch64-appimage-testing

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    env:
      BUILD_TYPE: Release
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - uses: actions/checkout@v6
      with:
        repository: ctlcltd/e2-sat-editor
        path: e2-sat-editor

    - name: Setup Aptitude
      run: |
        sudo apt-get update
        sudo apt-get install wget
        sudo apt-get install cmake ninja-build
        sudo apt-get install libgl1-mesa-dev libglvnd-dev libxcb-xkb-dev libxkbcommon-x11-dev libvulkan-dev
        sudo apt-get install libcups2-dev
        sudo apt-get install curl libcurl4-openssl-dev

    - name: Download deploy tools
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-aarch64.AppImage
        wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage
        chmod +x linuxdeploy-aarch64.AppImage
        chmod +x linuxdeploy-plugin-qt-aarch64.AppImage
        chmod +x appimagetool-aarch64.AppImage
        mv linuxdeploy-aarch64.AppImage /usr/local/bin/linuxdeploy
        mv linuxdeploy-plugin-qt-aarch64.AppImage /usr/local/bin/linuxdeploy-plugin-qt
        mv appimagetool-aarch64.AppImage /usr/local/bin/appimagetool

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4
      with:
        miniforge-version: latest
        auto-update-conda: true
        channels: conda-forge,defaults

    - name: Install conda-forge packages
      run: |
        conda install conda-forge::qt6-main
        conda install conda-forge::curl

    - name: Configure CMake
      working-directory: ${{github.workspace}}/e2-sat-editor/src
      run: |
        cmake \
        -G Ninja \
        -B build \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
        -DRELEASE_MEDIUM=github \
        -DWITHOUT_CLI=ON \
        -DAPPIMAGE=ON \
        -DDOWNLOAD_CURL_CABUNDLE=ON

    - name: Force fresh libcurl4 dependency
      working-directory: ${{github.workspace}}/e2-sat-editor/src
      run: |
        sudo apt-get remove curl
        cmake \
        -B build \
        -DCURL_LIBRARY=/home/runner/miniconda3/envs/test/lib \
        -DCURL_INCLUDE_DIR=/home/runner/miniconda3/envs/test/include

    - name: Build
      working-directory: ${{github.workspace}}/e2-sat-editor/src
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Deploy artifact
      working-directory: ${{github.workspace}}/e2-sat-editor/src
      continue-on-error: true
      run: |
        DESTDIR=../AppDir ninja -C build install
        # usr-share
        mv AppDir/usr/share/applications/e2-sat-editor.desktop AppDir/usr/share/applications/io.github.ctlcltd.e2se.desktop
        mv AppDir/usr/share/metainfo/io.github.ctlcltd.e2se.metainfo.xml AppDir/usr/share/metainfo/io.github.ctlcltd.e2se.appdata.xml
        mkdir -p AppDir/usr/share/doc/e2-sat-editor
        mv AppDir/usr/share/e2-sat-editor/Readme.txt AppDir/usr/share/doc/e2-sat-editor/readme
        mv AppDir/usr/share/e2-sat-editor/License.txt AppDir/usr/share/doc/e2-sat-editor/copyright
        mv AppDir/usr/share/e2-sat-editor/Third-Party.txt AppDir/usr/share/doc/e2-sat-editor/third-party
        # run linuxdeploy
        export LD_LIBRARY_PATH=/home/runner/miniconda3/envs/test/lib:/home/runner/miniconda3/lib:/usr/local/lib:/usr/lib
        export QMAKE=qmake6
        export DISABLE_COPYRIGHT_FILES_DEPLOYMENT=1
        export EXTRA_QT_MODULES="eglfsdeviceintegration;eglfskmssupport;xcbqpa"
        export EXTRA_PLATFORM_PLUGINS="libqeglfs.so;libqlinuxfb.so;libqminimal.so;libqminimalegl.so;libqoffscreen.so;libqvkkhrdisplay.so;libqvnc.so;libqwayland.so;libqxcb.so"
        linuxdeploy --appdir AppDir --plugin qt --output appimage
        export LD_LIBRARY_PATH=
        # package
        mkdir -p ../artifact
        mv e2_SAT_Editor-aarch64.AppImage ../artifact/
  
    - name: Fix artifact
      working-directory: ${{github.workspace}}/e2-sat-editor/artifact
      continue-on-error: true
      run: |
        wget https://github.com/e2se/apprunqtlinux/archive/refs/heads/main.tar.gz
        tar -zxf main.tar.gz
        cd apprunqtlinux-main
        cmake -B . -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release
        cd ..
        ./e2_SAT_Editor-aarch64.AppImage --appimage-extract
        mv squashfs-root/AppRun squashfs-root/AppRun.wrapped
        cp apprunqtlinux-main/AppRun squashfs-root/AppRun
        chmod +x squashfs-root/AppRun
        mv e2_SAT_Editor-aarch64.AppImage e2_SAT_Editor-aarch64.AppImage.bak
        appimagetool squashfs-root e2_SAT_Editor-aarch64.AppImage
        rm -R {apprunqtlinux-main,squashfs-root}
        rm main.tar.gz
        rm e2_SAT_Editor-aarch64.AppImage.bak

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        path: ${{github.workspace}}/e2-sat-editor/artifact
