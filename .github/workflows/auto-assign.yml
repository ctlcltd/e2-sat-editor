name: auto-assign

on:
  issues:
    types: [opened]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
    - name: Auto-assign issue
      uses: pozil/auto-assign-issue@v2
      with:
          assignees: ctlcltd
          numOfAssignee: 1
          allowSelfAssign: false
